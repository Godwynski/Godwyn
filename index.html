<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Animated Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f9;
            overflow-x: hidden;
        }

        /* Create a header with dynamic art effect */
        header {
            height: 100vh;
            background-color: #d0b9f2;
            color: white;
            text-align: center;
            position: relative;
            padding: 120px 0;
            font-size: 2.5em;
            font-weight: bold;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://picsum.photos/1200/600?random=3');
            background-size: cover;
            background-position: center;
            filter: brightness(50%);
            z-index: -1;
        }

        header h1 {
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
            animation: fadeInHeader 2s ease-in-out;
        }

        @keyframes fadeInHeader {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section Styles */
        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            padding: 20px;
            transition: all 0.5s ease-in-out;
        }

        .section:nth-child(odd) {
            background-color: #f9d8e1;
        }

        .section:nth-child(even) {
            background-color: #f1b3d2;
        }

        .section img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease-in-out;
            opacity: 0;
        }

        .section img:hover {
            transform: scale(1.1);
            opacity: 0.9;
        }

        /* Additional Styles for Nested Animations */
        .content {
            text-align: center;
            position: relative;
            animation: fadeInContent 2s ease-in-out;
        }

        .content h1 {
            font-size: 3em;
            color: #4d2a72;
            animation: slideIn 1s ease-out;
        }

        .content p {
            font-size: 1.5em;
            color: #4d2a72;
            margin-top: 20px;
            opacity: 0;
            animation: fadeInText 2s 1s forwards;
        }

        /* Nested animation of text */
        @keyframes fadeInText {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes fadeInContent {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .nested-animation {
            animation: pulse 1.5s infinite;
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 0.4;
            }
        }

        footer {
            padding: 20px;
            background-color: #333;
            color: white;
            text-align: center;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Interactive Art with Nested Animations</h1>
    </header>

    <!-- Section 1: Nested Animations -->
    <div class="section" data-aos="fade-up" data-aos-duration="1500">
        <div class="content">
            <h1>Section 1</h1>
            <p>Explore nested animations with smooth transitions!</p>
            <img src="https://picsum.photos/200/300?random=1" alt="Random Image 1">
        </div>
        <div class="nested-animation"></div> <!-- Nested animation art -->
    </div>

    <!-- Section 2: Nested Animations with Hover Effects -->
    <div class="section" data-aos="fade-left" data-aos-duration="1500">
        <div class="content">
            <h1>Section 2</h1>
            <p>Hover to discover more dynamic animations!</p>
            <img src="https://picsum.photos/200/300?random=2" alt="Random Image 2">
        </div>
        <div class="nested-animation"></div> <!-- Nested animation art -->
    </div>

    <!-- Section 3: Advanced Nested Animations -->
    <div class="section" data-aos="zoom-in" data-aos-duration="2000">
        <div class="content">
            <h1>Section 3</h1>
            <p>Zooming effects combined with a beautiful background.</p>
            <img src="https://picsum.photos/200/300?random=3" alt="Random Image 3">
        </div>
        <div class="nested-animation"></div> <!-- Nested animation art -->
    </div>

    <!-- Back to Top Button -->
    <div style="text-align: center; margin: 40px 0;">
        <button class="button" onclick="scrollToTop()">Back to Top</button>
    </div>

    <footer>
        <p>Created with ❤️ by You</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // Initialize AOS for animations
        AOS.init({
            duration: 1200, // Time in milliseconds for animation duration
            easing: 'ease-in-out',
            once: false, // Allow animations to trigger again when scrolling up
            offset: 200, // Trigger animation when the element is 200px away from the viewport
        });

        // GSAP animation for header
        gsap.from("header", {
            opacity: 0,
            y: -100,
            duration: 1.5,
            ease: "power3.out"
        });

        // Back to top button
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
