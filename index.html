<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Quiz</title>
</head>
<body>
    <h2>Personality Quiz</h2>
    <form id="quiz-form">
        <div id="questions"></div>
        <button type="button" onclick="calculateResult()">See Results</button>
    </form>
    <h3>Results:</h3>
    <div id="results"></div>
    
    <script>
        const questions = [
            { text: "Do you prefer deep conversations or casual chit-chat?", category: "Introvert-Extrovert" },
            { text: "How do you handle failure? Analyze and move on or feel deeply affected?", category: "Logical-Emotional" },
            { text: "Do you plan ahead or go with the flow?", category: "Planner-Spontaneous" },
            { text: "Do you work better alone or in a team?", category: "Independent-Team-Oriented" },
            { text: "Would you break a small rule for a big reward?", category: "Risk-Taker-Cautious" },
            { text: "Do you handle stress well or get overwhelmed easily?", category: "Resilient-Sensitive" },
            { text: "Do you believe things always work out or do you prepare for the worst?", category: "Optimist-Realist" },
            { text: "Do you take charge in group settings or prefer following?", category: "Leader-Follower" },
            { text: "Do you value luxury and status or simplicity?", category: "Materialistic-Minimalist" },
            { text: "Do you prefer familiar traditions or exploring new ideas?", category: "Traditional-Open-Minded" }
        ];

        const questionsDiv = document.getElementById("questions");

        questions.forEach((q, index) => {
            const div = document.createElement("div");
            div.innerHTML = `
                <p>${q.text}</p>
                <select name="q${index}" data-category="${q.category}">
                    <option value="1">Option 1 (Low Score)</option>
                    <option value="2">Neutral</option>
                    <option value="3">Option 3 (High Score)</option>
                </select>
            `;
            questionsDiv.appendChild(div);
        });

        function calculateResult() {
            const form = document.getElementById("quiz-form");
            const resultsDiv = document.getElementById("results");
            let categories = {};

            form.querySelectorAll("select").forEach(select => {
                const category = select.getAttribute("data-category");
                const value = parseInt(select.value);
                if (!categories[category]) categories[category] = 0;
                categories[category] += value;
            });

            resultsDiv.innerHTML = "";
            Object.keys(categories).forEach(category => {
                let level = categories[category] < 6 ? 'Low' : categories[category] < 9 ? 'Moderate' : 'High';
                resultsDiv.innerHTML += `<p>${category}: ${level}</p>`;
            });
        }
    </script>
</body>
</html>
