<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Animation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 100px 0;
            font-size: 2em;
        }
        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .section:nth-child(odd) {
            background-color: #f9f9f9;
        }
        .section:nth-child(even) {
            background-color: #444;
            color: white;
        }
        .content {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        Welcome to My Animated Website
    </header>

    <div class="section" data-aos="fade-up">
        <div class="content">
            <h1>Section 1</h1>
            <p>This section has a cool scroll animation effect!</p>
        </div>
    </div>

    <div class="section" data-aos="fade-right">
        <div class="content">
            <h1>Section 2</h1>
            <p>This section fades in from the right!</p>
        </div>
    </div>

    <div class="section" data-aos="fade-left">
        <div class="content">
            <h1>Section 3</h1>
            <p>Scroll down to see more smooth animations!</p>
        </div>
    </div>

    <div class="section" data-aos="zoom-in">
        <div class="content">
            <h1>Section 4</h1>
            <p>Zoom-in effect here! Pretty neat, huh?</p>
        </div>
    </div>

    <footer>
        <p style="text-align: center; padding: 20px; background-color: #333; color: white;">Created with love by You</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // Initialize AOS library
        AOS.init({
            duration: 1000, // animation duration
            easing: 'ease-in-out',
            once: true // Animation happens once
        });

        // GSAP animation example
        gsap.from("header", {
            opacity: 0,
            y: -100,
            duration: 1,
            ease: "bounce.out"
        });
    </script>
</body>
</html>
