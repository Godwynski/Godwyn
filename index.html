<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Animated Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f1f1;
            overflow-x: hidden;
        }

        /* Header with smooth fade-in and background image */
        header {
            height: 100vh;
            background-color: #d0b9f2;
            color: white;
            text-align: center;
            padding: 120px 0;
            font-size: 3em;
            font-weight: bold;
            position: relative;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://picsum.photos/1200/600?random=1');
            background-size: cover;
            background-position: center;
            filter: brightness(50%);
            z-index: -1;
        }

        header h1 {
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
            animation: fadeInHeader 3s ease-in-out;
        }

        @keyframes fadeInHeader {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section Styles */
        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            transition: all 0.5s ease-in-out;
            overflow: hidden;
        }

        /* Section Background Effects */
        .section:nth-child(odd) {
            background-color: #f7d8e4;
        }

        .section:nth-child(even) {
            background-color: #d1b0f1;
        }

        /* Styling for Images */
        .section img {
            width: 80%;
            max-width: 500px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.6s ease, opacity 0.6s ease;
            opacity: 0;
        }

        .section img:hover {
            transform: scale(1.15);
            opacity: 0.9;
        }

        /* Content Animations */
        .content {
            text-align: center;
            animation: fadeInContent 2.5s ease-in-out;
        }

        .content h1 {
            font-size: 3em;
            color: #4b2b77;
            animation: slideIn 1s ease-out;
        }

        .content p {
            font-size: 1.3em;
            color: #4b2b77;
            margin-top: 20px;
            opacity: 0;
            animation: fadeInText 2s 1s forwards;
        }

        @keyframes fadeInText {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes fadeInContent {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Parallax Scroll Animation */
        .parallax {
            background-image: url('https://picsum.photos/1200/600?random=2');
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            height: 100vh;
            width: 100%;
            position: relative;
            transition: all 0.3s ease-in-out;
        }

        /* Hover effect for Sections */
        .section:hover img {
            transform: scale(1.25);
            opacity: 0.8;
        }

        footer {
            padding: 20px;
            background-color: #333;
            color: white;
            text-align: center;
            font-size: 1em;
        }

        /* Button Styling */
        .button {
            padding: 12px 30px;
            background-color: #ff80b5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #f07096;
        }
    </style>
</head>
<body>
    <header>
        <h1>Elegant Animated Art</h1>
    </header>

    <!-- Parallax Section -->
    <div class="parallax" data-aos="fade-up" data-aos-duration="2000">
        <div class="content">
            <h1>Parallax Effect</h1>
            <p>This is a stunning parallax scroll effect.</p>
            <img src="https://picsum.photos?random=3" alt="Random Image 1">
        </div>
    </div>

    <!-- Section 1: Zoom-in Effect -->
    <div class="section" data-aos="zoom-in" data-aos-duration="2000">
        <div class="content">
            <h1>Zoom In Effect</h1>
            <p>Enjoy the zoom-in effect as you scroll.</p>
            <img src="https://picsum.photos?random=4" alt="Random Image 2">
        </div>
    </div>

    <!-- Section 2: Fade and Scale Animations -->
    <div class="section" data-aos="fade-up" data-aos-duration="2500">
        <div class="content">
            <h1>Elegant Animations</h1>
            <p>Fading and scaling in sync with your scroll.</p>
            <img src="https://picsum.photos?random=5" alt="Random Image 3">
        </div>
    </div>

    <!-- Section 3: Hover and Scale Animation -->
    <div class="section" data-aos="fade-right" data-aos-duration="3000">
        <div class="content">
            <h1>Hover and Scale</h1>
            <p>Hover to see the image scale gracefully.</p>
            <img src="https://picsum.photos?random=6" alt="Random Image 4">
        </div>
    </div>

    <!-- Back to Top Button -->
    <div style="text-align: center; margin: 40px 0;">
        <button class="button" onclick="scrollToTop()">Back to Top</button>
    </div>

    <footer>
        <p>Created with ❤️ by You</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // Initialize AOS for animations
        AOS.init({
            duration: 1200,
            easing: 'ease-in-out',
            once: false,
            offset: 200,
        });

        // GSAP animation for header
        gsap.from("header", {
            opacity: 0,
            y: -100,
            duration: 2,
            ease: "power3.out"
        });

        // Back to top button
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
